services:
  alpaca-cloud-proxy:
    build:
      context: .
      dockerfile: Dockerfile.cloud-proxy
    ports:
      - "8767:8765"
      - "8768:8766"
    environment:
      - IS_LIVE=false
      - IS_PRO=true
      - ALPACA_MASTER_KEY=${ALPACA_MASTER_KEY}
      - ALPACA_MASTER_SECRET=${ALPACA_MASTER_SECRET}
      - ALPACA_PROXY_TOKEN=${ALPACA_PROXY_TOKEN}
      - ALPACA_OPTIONS_FEED=${ALPACA_OPTIONS_FEED:-opra}
      - SEND_TIMEOUT_SECONDS=${SEND_TIMEOUT_SECONDS:-1.5}
      - SEND_QUEUE_MAX=${SEND_QUEUE_MAX:-200}
      - DEBUG_LOG_PATH=/tmp/cloud-proxy-debug.log
